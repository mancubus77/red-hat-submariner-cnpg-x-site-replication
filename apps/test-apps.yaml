# Submariner Test Applications
# ============================
#
# This directory contains BusyBox-based test applications for verifying
# Submariner connectivity between clusters.
#
# Architecture:
# - Cluster 1: Runs the busybox-server (HTTP server on port 8080)
# - Cluster 2: Runs the busybox-client (test client)
#
# Deployment:
# -----------
#
# 1. Deploy server on Cluster 1:
#    export KUBECONFIG=/path/to/cluster-one/kubeconfig
#    kubectl apply -k apps/cluster-one/
#
# 2. Deploy client on Cluster 2:
#    export KUBECONFIG=/path/to/cluster-two/kubeconfig
#    kubectl apply -k apps/cluster-two/
#
# Testing Connectivity:
# --------------------
#
# 1. Exec into the client pod on Cluster 2:
#    kubectl exec -it -n submariner-test deploy/busybox-client -- sh
#
# 2. Test DNS resolution (should resolve via Submariner):
#    nslookup busybox-server.submariner-test.svc.clusterset.local
#
# 3. Test HTTP connectivity to server on Cluster 1:
#    wget -qO- http://busybox-server.submariner-test.svc.clusterset.local:8080
#
# 4. Check automated test results:
#    kubectl get jobs -n submariner-test
#    kubectl logs -n submariner-test job/<job-name>
#
# Cleanup:
# --------
#    kubectl delete -k apps/cluster-one/  # on Cluster 1
#    kubectl delete -k apps/cluster-two/  # on Cluster 2



---
# Secret for demo user credentials
apiVersion: v1
kind: Secret
metadata:
  name: demo-user-secret
  namespace: cnpg-database
type: kubernetes.io/basic-auth
stringData:
  username: demo
  password: demo
---
# Database CRD - Creates the "demo" database
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: demo-database
  namespace: cnpg-database
spec:
  name: demo
  owner: demo
  cluster:
    name: cnpg-primary
---
# Job to create user and table
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-setup
  namespace: cnpg-database
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: ghcr.io/cloudnative-pg/postgresql:16.4
          env:
            - name: PGHOST
              value: cnpg-primary-rw.cnpg-database.svc
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cnpg-cluster-superuser
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Creating demo user ==="
              psql -d postgres -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'demo') THEN CREATE USER demo WITH PASSWORD 'demo' LOGIN; END IF; END \$\$;"
              
              echo "=== Creating demo database ==="
              if ! psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='demo'" | grep -q 1; then
                psql -d postgres -c "CREATE DATABASE demo OWNER demo;"
              else
                echo "Database demo already exists"
              fi
              
              echo "=== Granting permissions ==="
              psql -d demo -c "GRANT ALL PRIVILEGES ON DATABASE demo TO demo;"
              psql -d demo -c "GRANT ALL ON SCHEMA public TO demo;"
              
              echo "=== Creating sample table ==="
              psql -d demo -c "CREATE TABLE IF NOT EXISTS items (id SERIAL PRIMARY KEY, name VARCHAR(255) NOT NULL, description TEXT, quantity INTEGER DEFAULT 0, price NUMERIC(10,2), created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP);"
              
              echo "=== Setting table ownership ==="
              psql -d demo -c "ALTER TABLE items OWNER TO demo;"
              
              echo "=== Inserting sample data ==="
              psql -d demo -c "INSERT INTO items (name, description, quantity, price) SELECT 'Sample Item 1', 'This is a sample item', 10, 19.99 WHERE NOT EXISTS (SELECT 1 FROM items WHERE name = 'Sample Item 1');"
              psql -d demo -c "INSERT INTO items (name, description, quantity, price) SELECT 'Sample Item 2', 'Another sample item', 25, 29.99 WHERE NOT EXISTS (SELECT 1 FROM items WHERE name = 'Sample Item 2');"
              psql -d demo -c "INSERT INTO items (name, description, quantity, price) SELECT 'Sample Item 3', 'Third sample item', 5, 49.99 WHERE NOT EXISTS (SELECT 1 FROM items WHERE name = 'Sample Item 3');"
              
              echo "=== Verifying setup ==="
              PGPASSWORD=demo psql -h $PGHOST -d demo -U demo -c "SELECT * FROM items;"
              
              echo "=== Demo setup complete! ==="


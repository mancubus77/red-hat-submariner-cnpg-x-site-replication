---
# Secret for database superuser credentials
# Used by both primary and replica clusters
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-cluster-superuser
  namespace: cnpg-database
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: supersecretpassword
---
# Secret for application user credentials
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-cluster-app
  namespace: cnpg-database
type: kubernetes.io/basic-auth
stringData:
  username: app
  password: apppassword



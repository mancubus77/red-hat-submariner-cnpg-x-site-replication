apiVersion: submarineraddon.open-cluster-management.io/v1alpha1
kind: SubmarinerConfig
metadata:
  name: submariner
  namespace: cluster-two
spec:
  gatewayConfig:
    gateways: 1
    aws:
      instanceType: m5n.large
  IPSecNATTPort: 4500
  NATTEnable: true
  cableDriver: libreswan
  credentialsSecret:
    name: cluster-two-aws-creds

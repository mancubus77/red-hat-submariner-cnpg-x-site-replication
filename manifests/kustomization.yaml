apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace for Submariner Broker
  - namespace.yaml
  
  # ManagedClusterSet - groups clusters for Submariner
  - clustergroup.yaml
  
  # Bind the ClusterSet to the broker namespace
  - clusterset-binding.yaml
  
  # Submariner Broker with Globalnet enabled
  - broker.yaml

  # Fix missing secrets RBAC on the broker Role (operator reconciles its own Role,
  # so this is a separate Role+RoleBinding that won't be overwritten)
  - broker-secrets-rbac.yaml
  
  # Label ManagedClusters to join the ClusterSet
  - managedcluster-labels-cluster-one.yaml
  - managedcluster-labels-cluster-two.yaml
  
  # SubmarinerConfig for each cluster
  - submariner-config-cluster-one.yaml
  - submariner-config-cluster-two.yaml
  
  # ManagedClusterAddOn to install Submariner on each cluster
  - addon-local-cluster.yaml
  - addon-cluster-two.yaml

labels:
  - pairs:
      app.kubernetes.io/name: submariner
      app.kubernetes.io/part-of: acm-submariner
    includeSelectors: false
